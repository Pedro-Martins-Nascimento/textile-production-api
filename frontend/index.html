<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Produção - Teares circulares</title>
    <link rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧵</text></svg>">


    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Registro de Produção (teares circulares)</h1>
    <div id="mensagem"></div>

    <form id="form">

        <input type="hidden" id="id">

        <label>Data</label>
        <input type="date" id="data_producao" required>

        <label>Número do Tear</label>
        <input type="text" id="numero_tear" required>

        <label>Código do Produto</label>
        <input type="text" id="codigo_produto" required>

        <label>Turno</label>
        <select id="turno">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>

        <label>Qualidade</label>
        <select id="qualidade">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>

        <label>Quilos</label>
        <input type="number" step="0.1" id="quilos">

        <label>Peças</label>
        <input type="number" id="pecas">

        <button type="submit">Salvar</button>

    </form>

    <hr>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Data</th>
                <th>Tear</th>
                <th>Produto</th>
                <th>Turno</th>
                <th>Qualidade</th>
                <th>Kg</th>
                <th>Peças</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody id="tbody"></tbody>

    </table>

</div>

<script src="app.js"></script>

</body>
</html>
